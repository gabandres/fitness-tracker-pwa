<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Ember gradient: white-hot amber base → coral → deep-red tip. -->
    <radialGradient id="ember" cx="50%" cy="66%" r="62%">
      <stop offset="0" stop-color="#f2b24a"/>
      <stop offset="0.5" stop-color="#c0472f"/>
      <stop offset="1" stop-color="#6e121a"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" fill="#f4f0e8"/>

  <!-- Outer ring = calories. Muted track + a deep-red arc (~76% filled). -->
  <circle cx="256" cy="256" r="176" fill="none" stroke="#c8b8a0" stroke-width="26" opacity="0.5"/>
  <circle cx="256" cy="256" r="176"
          fill="none"
          stroke="#6e121a"
          stroke-width="26"
          stroke-linecap="round"
          stroke-dasharray="840 266"
          transform="rotate(-90 256 256)"/>

  <!-- Inner ring = protein. Lighter track + a terracotta arc (~62% filled),
       same warm family as the outer so the two read as macro rings. -->
  <circle cx="256" cy="256" r="112" fill="none" stroke="#d8cdba" stroke-width="22" opacity="0.7"/>
  <circle cx="256" cy="256" r="112"
          fill="none"
          stroke="#a8402e"
          stroke-width="22"
          stroke-linecap="round"
          stroke-dasharray="436 268"
          transform="rotate(-90 256 256)"/>

  <!-- Ignia ember in the center hole — the same flame glyph as the mobile
       brand mark (Flame.tsx), so the fire reads identically everywhere. -->
  <g transform="translate(156 152) scale(2)">
    <path d="M50 15 C 62 31 64 45 60 58 C 57 70 52 78 50 87 C 48 78 43 70 40 58 C 36 45 38 31 50 15 Z"
          fill="url(#ember)"/>
    <path d="M50 41 C 56 49 57 57 54 64 C 52 70 51 74 50 79 C 49 74 48 70 46 64 C 43 57 44 49 50 41 Z"
          fill="#f2b24a" opacity="0.92"/>
    <circle cx="50" cy="66" r="6" fill="#fdf6ec" opacity="0.85"/>
  </g>
</svg>
