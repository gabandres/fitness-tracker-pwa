<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Warm cream paper background -->
  <rect width="512" height="512" fill="#f2ead7"/>

  <!-- Subtle paper grain (low-opacity horizontal rules) -->
  <g opacity="0.04">
    <line x1="0" y1="128" x2="512" y2="128" stroke="#1a1612" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="#1a1612" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="#1a1612" stroke-width="1"/>
  </g>

  <!-- Big oxblood M, drawn as a pure polyline so rasterization is
       font-independent. Kept inside the maskable safe zone (center 80%). -->
  <polyline
    points="140,394 140,118 256,318 372,118 372,394"
    stroke="#8b1a1a"
    stroke-width="76"
    stroke-linecap="square"
    stroke-linejoin="miter"
    stroke-miterlimit="4"
    fill="none"/>

  <!-- Period dot under the M — the calibration mark -->
  <circle cx="256" cy="438" r="16" fill="#8b1a1a"/>
</svg>
