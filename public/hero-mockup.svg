<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720" width="720" height="720" role="img" aria-label="Ignia v2 today screen — kcal and protein rings on a warm-minimal paper card">
  <defs>
    <style>
      .paper { fill: #FAF7F2; }
      .ink { fill: #1C1915; }
      .ink-soft { fill: #5A544A; }
      .ink-muted { fill: #8E867A; }
      .accent { stroke: #B4513A; fill: none; }
      .accent-fill { fill: #B4513A; }
      .sage { stroke: #6B8E5A; fill: none; }
      .sage-fill { fill: #6B8E5A; }
      .rule { fill: #E3DCCD; }
      .ring-bg { stroke: #EDE6D6; fill: none; }
      .h1 { font: 600 36px/1.1 'Geist', 'Inter', system-ui, sans-serif; letter-spacing: -0.02em; }
      .caption { font: 500 14px/1.4 'Geist', 'Inter', system-ui, sans-serif; letter-spacing: 0.02em; }
      .num-big { font: 600 64px/1 'Geist Mono', ui-monospace, monospace; letter-spacing: -0.02em; }
      .num-mid { font: 600 32px/1 'Geist Mono', ui-monospace, monospace; }
      .num-sm { font: 500 18px/1 'Geist Mono', ui-monospace, monospace; }
      .label { font: 500 12px/1 'Geist', 'Inter', system-ui, sans-serif; letter-spacing: 0.08em; text-transform: uppercase; }
      .body { font: 400 16px/1.4 'Geist', 'Inter', system-ui, sans-serif; }
    </style>
  </defs>

  <!-- Card -->
  <rect x="40" y="40" width="640" height="640" rx="20" class="paper" stroke="#E3DCCD" stroke-width="1"/>

  <!-- Header -->
  <text x="80" y="115" class="h1 ink">Today</text>
  <text x="80" y="142" class="caption ink-muted">Thu · Apr 30 · 6 day streak</text>

  <!-- Rings group: kcal (outer accent) + protein (smaller sage) -->
  <!-- kcal ring: cx=320 cy=340 r=125, stroke 18 — about 76% filled -->
  <circle cx="320" cy="340" r="125" class="ring-bg" stroke-width="18"/>
  <circle cx="320" cy="340" r="125" class="accent" stroke-width="18" stroke-linecap="round"
    stroke-dasharray="785" stroke-dashoffset="188" transform="rotate(-90 320 340)"/>
  <text x="320" y="332" class="num-big ink" text-anchor="middle">1,553</text>
  <text x="320" y="365" class="caption ink-muted" text-anchor="middle">/ 2,040 kcal</text>

  <!-- protein ring: cx=540 cy=340 r=72, stroke 14 — about 92% filled -->
  <circle cx="540" cy="340" r="72" class="ring-bg" stroke-width="14"/>
  <circle cx="540" cy="340" r="72" class="sage" stroke-width="14" stroke-linecap="round"
    stroke-dasharray="452" stroke-dashoffset="36" transform="rotate(-90 540 340)"/>
  <text x="540" y="346" class="num-mid ink" text-anchor="middle">138g</text>

  <!-- Carbs / fat chips -->
  <g transform="translate(80, 510)">
    <rect width="120" height="44" rx="22" fill="#F2EBDA"/>
    <text x="60" y="28" class="caption ink-soft" text-anchor="middle">Carbs · 184g</text>
  </g>
  <g transform="translate(220, 510)">
    <rect width="120" height="44" rx="22" fill="#F2EBDA"/>
    <text x="60" y="28" class="caption ink-soft" text-anchor="middle">Fat · 62g</text>
  </g>

  <!-- Entry list preview -->
  <g transform="translate(80, 580)">
    <rect width="560" height="1" class="rule"/>
    <text x="0" y="32" class="body ink">Chicken bowl</text>
    <text x="560" y="32" class="num-sm ink" text-anchor="end">540 kcal</text>
    <text x="0" y="58" class="caption ink-muted">Lunch · 42g protein</text>
  </g>
</svg>
