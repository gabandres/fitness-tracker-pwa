<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 60" width="180" height="60" role="img" aria-label="Download on the App Store">
  <!--
    Apple "Download on the App Store" badge, redrawn locally so the asset is
    self-hosted (no external request, works offline in the PWA shell, and
    survives the immutable cache headers in firebase.json).

    Apple's marketing guidelines require the official artwork proportions and
    the black-with-hairline treatment; this matches them. If you ever want the
    byte-exact vendor file, download it from
    https://developer.apple.com/app-store/marketing/guidelines/ and overwrite
    this file — every reference points at /appstore-badge.svg, so nothing else
    needs to change.
  -->
  <title>Download on the App Store</title>
  <rect x="0.5" y="0.5" width="179" height="59" rx="10" fill="#000000" stroke="#A6A6A6" stroke-width="1"/>
  <!-- Apple mark, 384×512 source path scaled to ~25×34 and optically centred. -->
  <g transform="translate(17 13) scale(0.0664)" fill="#FFFFFF">
    <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9z"/>
    <path d="M262.1 104.5c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/>
  </g>
  <text x="52" y="25" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9.5" letter-spacing="0.4">Download on the</text>
  <text x="52" y="46" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20.5" font-weight="600" letter-spacing="-0.4">App Store</text>
</svg>
