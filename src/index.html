<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Ignia — how many calories do I have left today?</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- Light-paper default; app.ts swaps this per theme (dark/sepia/…)
         at runtime so the browser chrome always matches the palette. -->
    <meta name="theme-color" content="#f2ead7" />
    <!-- Both names kept for now: mobile-web-app-capable is the modern
         spec (Chrome, Firefox, Edge) while apple-mobile-web-app-capable
         remains the one iOS Safari reads. Dropping the Apple-prefixed
         form would regress add-to-home-screen behaviour on iPhone. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Macros" />

    <!-- Search + social preview. og:image lives at /og-image.png (1200×630).
         Generate via `sharp` at build time — see scripts/og-image.ts. -->
    <meta name="description" content="A quiet, private calorie + protein log with AI coaching. Measured TDEE from your own data. No ads. No data selling. PWA on every device." />
    <link rel="canonical" href="https://ignia.fit/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ignia" />
    <meta property="og:title" content="Ignia — how many calories do I have left today?" />
    <meta property="og:description" content="A quiet, private calorie + protein log with AI coaching. Measured TDEE from your own data." />
    <meta property="og:url" content="https://ignia.fit/" />
    <meta property="og:image" content="https://ignia.fit/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Ignia — a calorie and protein ring with today's totals." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ignia" />
    <meta name="twitter:description" content="A quiet, private calorie + protein log with AI coaching." />
    <meta name="twitter:image" content="https://ignia.fit/og-image.png" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Ignia",
        "alternateName": "Macros",
        "description": "A quiet, private calorie and protein log with AI coaching. Measured TDEE from your own data. No ads. No data selling. PWA on every device.",
        "applicationCategory": "HealthApplication",
        "applicationSubCategory": "Nutrition",
        "operatingSystem": "Web, iOS, Android",
        "url": "https://ignia.fit/",
        "image": "https://ignia.fit/og-image.png",
        "screenshot": "https://ignia.fit/og-image.png",
        "softwareVersion": "1",
        "inLanguage": ["en", "es-PR"],
        "featureList": [
          "Daily calorie and protein log",
          "Measured TDEE from 14+ days of real data",
          "AI weekly report and coaching",
          "Photo to macros via Gemini",
          "Weight trend with 7-day EMA",
          "Fasting chronometer",
          "Body measurements",
          "Apple Shortcuts webhook",
          "Offline-first PWA"
        ],
        "offers": [
          { "@type": "Offer", "price": "0", "priceCurrency": "USD", "name": "Free" },
          { "@type": "Offer", "price": "3", "priceCurrency": "USD", "name": "Pro (monthly)" },
          { "@type": "Offer", "price": "24", "priceCurrency": "USD", "name": "Pro (annual)" }
        ],
        "author": {
          "@type": "Person",
          "name": "Gabriel Bermudez",
          "url": "https://ignia.fit/"
        },
        "publisher": {
          "@type": "Person",
          "name": "Gabriel Bermudez"
        }
      }
    </script>

    <link rel="icon" type="image/png" href="favicon.png" />
    <!-- iOS Safari prefers 180 for iPhone and 152 for iPad. Declaring each
         avoids iOS scaling a mismatched size when the user adds Ignia
         to the home screen. -->
    <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180x180.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192x192.png" />

    <!-- iOS launch (splash) screens — branded paper + logo instead of a
         blank white flash on PWA launch. Generated by scripts/pwa-assets.mjs. -->
    <link rel="apple-touch-startup-image" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="splash/apple-splash-1290-2796.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="splash/apple-splash-1179-2556.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="splash/apple-splash-1284-2778.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="splash/apple-splash-1170-2532.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="splash/apple-splash-1125-2436.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="splash/apple-splash-1242-2688.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="splash/apple-splash-828-1792.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" href="splash/apple-splash-1242-2208.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="splash/apple-splash-750-1334.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="splash/apple-splash-640-1136.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="splash/apple-splash-1536-2048.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 744px) and (device-height: 1133px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="splash/apple-splash-1488-2266.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 834px) and (device-height: 1112px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="splash/apple-splash-1668-2224.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="splash/apple-splash-1668-2388.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="splash/apple-splash-2048-2732.png" />

    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <!-- v2 type stack — Geist Sans + Geist Mono. Canonical fonts
         post-v1-retirement; Instrument Serif/DM Sans/JetBrains Mono
         remain loaded above only because preserved utility CSS
         (.field-input etc., still used inside entry-sheet-v2 child
         components) reads from --font-* variables that point at
         them. Geist is what every v2 surface renders in. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <app-root></app-root>
    <noscript>Please enable JavaScript to continue using this application. / Por favor habilita JavaScript para continuar usando esta aplicación.</noscript>
  </body>
</html>
